<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <h2>StreamStats</h2>
    <ul>
      <li>Home</li>
      <li>Platforms</li>
      <li>About</li>
    </ul>
  </nav>

  <section class="hero">
    <h1>The Cost of Streaming Over Time</h1>
    <p>What started as cheap became expensive.</p>
  </section>

  <section class="chart-section">
    <canvas id="priceChart"></canvas>
  </section>

  <section class="platform-row">
    <h2>Explore Platforms</h2>

    <div class="card" onclick="goToPlatform('netflix')">
      <img src="../assets/logos/netflix.png">
      <p>Netflix</p>
    </div>

    <div class="card" onclick="goToPlatform('spotify')">
      <img src="../assets/logos/spotify.png">
      <p>Spotify</p>
    </div>

  </section>

  <script src="../js/charts.js"></script>
  <script src="../js/main.js"></script>
  <link rel="stylesheet" href="../css/styles.css">
</body>
</html>
