<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Platform</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>


  <!-- fake subscription -->

<div class="pricing-section">
  <h2>Choose Your Plan</h2>

  <div class="plans">

    <div class="plan">
      <h3>Basic</h3>
      <p>$7.99</p>
      <button>Select</button>
    </div>

    <div class="plan highlight">
      <h3>Standard</h3>
      <p>$15.49</p>
      <button>Select</button>
    </div>

    <div class="plan">
      <h3>Premium</h3>
      <p>$22.99</p>
      <button>Select</button>
    </div>

  </div>
</div>
  
  
  <!-- future molly: EDIT HERO BANNER -->
  <div class="platform-hero">
    <div class="overlay">
      <h1 id="platformTitle"></h1>
      <p class="tagline">A story of rising costs and shifting value.</p>

      <div class="buttons">
        <button class="play">▶ Play Analysis</button>
        <button class="info">More Info</button>
      </div>
    </div>
  </div>

  <!-- DETAILS -->
  <div class="platform-content">
    <p>
      Over time, this platform has steadily increased prices while reshaping
      what users receive in return. This page will walk through that evolution.
    </p>

    <!-- You’ll drop your chart here later -->
    <div class="chart-placeholder">
      <p>[Your visualization goes here]</p>
    </div>
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
